
# Nombre de la aplicación
spring.application.name=espaciodigital2026

# Configuración del servidor embebido (Spring Boot)
server.port=8081
server.address=0.0.0.0

# Configuración de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://10.109.1.63:5432/armonizacion
spring.datasource.username=postgres
spring.datasource.password=nuevo_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA / Hibernate
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.types.print.banner=true

